<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent ダッシュボード</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --info: #06b6d4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header h1 span { color: var(--accent); }
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 12px; font-size: 12px;
      background: rgba(34,197,94,0.15); color: var(--success);
    }
    .status-badge.offline { background: rgba(239,68,68,0.15); color: var(--error); }
    .status-badge::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: currentColor; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px;
    }
    .card-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.5px; }
    .card-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .card-value.success { color: var(--success); }
    .card-value.warning { color: var(--warning); }
    .card-value.error { color: var(--error); }
    .card-value.info { color: var(--info); }

    .section { margin-bottom: 24px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title { font-size: 16px; font-weight: 600; }
    .refresh-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { color: var(--text-muted); font-weight: 500; font-size: 11px; letter-spacing: 0.5px; }
    tr:hover td { background: rgba(59,130,246,0.05); }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 500;
    }
    .badge-pending { background: rgba(148,163,184,0.2); color: var(--text-muted); }
    .badge-in_progress { background: rgba(59,130,246,0.2); color: var(--accent); }
    .badge-completed { background: rgba(34,197,94,0.2); color: var(--success); }
    .badge-failed { background: rgba(239,68,68,0.2); color: var(--error); }
    .badge-awaiting_approval { background: rgba(245,158,11,0.2); color: var(--warning); }
    .badge-ci_checking { background: rgba(6,182,212,0.2); color: var(--info); }
    .badge-ci_passed { background: rgba(34,197,94,0.2); color: var(--success); }
    .badge-ci_fixing { background: rgba(245,158,11,0.2); color: var(--warning); }
    .badge-ci_failed { background: rgba(239,68,68,0.2); color: var(--error); }
    .badge-planning { background: rgba(139,92,246,0.2); color: #a78bfa; }
    .badge-validating { background: rgba(6,182,212,0.2); color: var(--info); }

    .events-log {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; max-height: 300px; overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    }
    .event-line { padding: 4px 0; border-bottom: 1px solid rgba(51,65,85,0.5); }
    .event-time { color: var(--text-muted); }
    .event-type { font-weight: 600; }
    .event-type.started { color: var(--accent); }
    .event-type.completed { color: var(--success); }
    .event-type.failed { color: var(--error); }
    .event-type.progress { color: var(--info); }

    .eval-bar { display: flex; align-items: center; gap: 8px; }
    .eval-bar-fill {
      height: 6px; border-radius: 3px; background: var(--success);
      transition: width 0.3s;
    }
    .eval-bar-track { flex: 1; height: 6px; border-radius: 3px; background: var(--border); }

    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr 1fr; }
      main { padding: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>AI Agent</span> ダッシュボード v3.0</h1>
    <div id="connection-status" class="status-badge">接続中...</div>
  </header>

  <main>
    <!-- ステータスカード -->
    <div class="grid" id="status-cards">
      <div class="card">
        <div class="card-label">全タスク数</div>
        <div class="card-value info" id="stat-total">-</div>
      </div>
      <div class="card">
        <div class="card-label">実行中</div>
        <div class="card-value" id="stat-active">-</div>
      </div>
      <div class="card">
        <div class="card-label">完了</div>
        <div class="card-value success" id="stat-completed">-</div>
      </div>
      <div class="card">
        <div class="card-label">失敗</div>
        <div class="card-value error" id="stat-failed">-</div>
      </div>
      <div class="card">
        <div class="card-label">承認待ち</div>
        <div class="card-value warning" id="stat-awaiting">-</div>
      </div>
      <div class="card">
        <div class="card-label">接続クライアント</div>
        <div class="card-value" id="stat-sse">-</div>
      </div>
    </div>

    <!-- タスクキュー -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">タスクキュー</span>
        <button class="refresh-btn" onclick="loadTasks()">更新</button>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>種別</th>
              <th>タイトル</th>
              <th>ステータス</th>
              <th>コスト</th>
              <th>ターン</th>
              <th>作成日時</th>
            </tr>
          </thead>
          <tbody id="task-table-body">
            <tr><td colspan="7" class="empty-state">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- エージェント性能 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">エージェント性能</span>
        <button class="refresh-btn" onclick="loadEval()">更新</button>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>エージェント</th>
              <th>モデル</th>
              <th>実行数</th>
              <th>成功率</th>
              <th>平均コスト</th>
              <th>平均時間</th>
              <th>平均品質</th>
            </tr>
          </thead>
          <tbody id="eval-table-body">
            <tr><td colspan="7" class="empty-state">まだデータがありません</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- リアルタイムイベント -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">リアルタイムイベント</span>
        <button class="refresh-btn" onclick="clearEvents()">クリア</button>
      </div>
      <div class="events-log" id="events-log">
        <div class="event-line"><span class="event-time">--:--:--</span> イベント待機中...</div>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin;
    let eventSource = null;

    // ステータス名の日本語マップ
    const STATUS_LABELS = {
      pending: '待機中',
      in_progress: '実行中',
      completed: '完了',
      failed: '失敗',
      awaiting_approval: '承認待ち',
      ci_checking: 'CI確認中',
      ci_passed: 'CI通過',
      ci_fixing: 'CI修正中',
      ci_failed: 'CI失敗',
      planning: '計画中',
      validating: '検証中',
    };

    // タスク種別の日本語マップ
    const TYPE_LABELS = {
      review: '設計',
      fix: 'バグ修正',
      build: '新機能',
      document: 'ドキュメント',
      analyze: '分析',
      design: '設計',
      implement: '実装',
      critique: 'レビュー',
    };

    // --- ステータス ---
    async function loadStatus() {
      try {
        const res = await fetch(`${API_BASE}/api/status`);
        const data = await res.json();
        const t = data.tasks || {};
        document.getElementById('stat-total').textContent = Object.values(t).reduce((a, b) => a + b, 0);
        document.getElementById('stat-active').textContent = (t.in_progress || 0) + (t.planning || 0);
        document.getElementById('stat-completed').textContent = t.completed || 0;
        document.getElementById('stat-failed').textContent = t.failed || 0;
        document.getElementById('stat-awaiting').textContent = t.awaiting_approval || 0;
        document.getElementById('stat-sse').textContent = data.sseClients || 0;
      } catch { /* ignore */ }
    }

    // --- タスク ---
    async function loadTasks() {
      try {
        const res = await fetch(`${API_BASE}/api/tasks`);
        const data = await res.json();
        const tbody = document.getElementById('task-table-body');

        if (!data.tasks || data.tasks.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="empty-state">タスクはありません</td></tr>';
          return;
        }

        tbody.innerHTML = data.tasks.map(t => `
          <tr>
            <td><code>${esc(t.id)}</code></td>
            <td>${esc(TYPE_LABELS[t.task_type] || t.task_type)}</td>
            <td>${esc(truncate(t.title, 50))}</td>
            <td><span class="badge badge-${t.status}">${esc(STATUS_LABELS[t.status] || t.status)}</span></td>
            <td>${t.cost_usd ? '$' + Number(t.cost_usd).toFixed(2) : '-'}</td>
            <td>${t.turns_used || '-'}</td>
            <td>${formatTime(t.created_at)}</td>
          </tr>
        `).join('');
      } catch {
        document.getElementById('task-table-body').innerHTML =
          '<tr><td colspan="7" class="empty-state">読み込みに失敗しました</td></tr>';
      }
    }

    // --- エージェント性能 ---
    async function loadEval() {
      try {
        const res = await fetch(`${API_BASE}/api/eval`);
        const data = await res.json();
        const tbody = document.getElementById('eval-table-body');

        if (!data.summary || data.summary.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="empty-state">まだデータがありません</td></tr>';
          return;
        }

        tbody.innerHTML = data.summary.map(s => {
          const rate = s.total > 0 ? (s.successes / s.total * 100) : 0;
          const rateColor = rate >= 80 ? 'success' : rate >= 50 ? 'warning' : 'error';
          return `
            <tr>
              <td>${esc(s.agent_role)}</td>
              <td>${esc(s.model)}</td>
              <td>${s.total}件</td>
              <td>
                <div class="eval-bar">
                  <div class="eval-bar-track"><div class="eval-bar-fill" style="width:${rate}%;background:var(--${rateColor})"></div></div>
                  <span style="color:var(--${rateColor})">${rate.toFixed(0)}%</span>
                </div>
              </td>
              <td>${s.avg_cost ? '$' + Number(s.avg_cost).toFixed(3) : '-'}</td>
              <td>${s.avg_duration ? Math.round(s.avg_duration / 1000) + '秒' : '-'}</td>
              <td>${s.avg_quality != null ? s.avg_quality + '/100' : '-'}</td>
            </tr>
          `;
        }).join('');
      } catch {
        document.getElementById('eval-table-body').innerHTML =
          '<tr><td colspan="7" class="empty-state">読み込みに失敗しました</td></tr>';
      }
    }

    // --- SSE イベント ---
    function connectSSE() {
      const badge = document.getElementById('connection-status');

      if (eventSource) eventSource.close();
      eventSource = new EventSource(`${API_BASE}/api/events`);

      eventSource.onopen = () => {
        badge.textContent = '接続済み';
        badge.className = 'status-badge';
      };

      eventSource.onmessage = (e) => {
        try {
          const event = JSON.parse(e.data);
          if (event.type === 'connected') return;
          addEventLine(event);
          if (event.type?.includes('task_')) {
            loadStatus();
            loadTasks();
          }
        } catch { /* ignore */ }
      };

      eventSource.onerror = () => {
        badge.textContent = '切断';
        badge.className = 'status-badge offline';
        setTimeout(connectSSE, 5000);
      };
    }

    // イベント種別の日本語マップ
    const EVENT_LABELS = {
      task_started: 'タスク開始',
      task_progress: '進捗',
      task_completed: 'タスク完了',
      task_failed: 'タスク失敗',
      node_started: 'ノード開始',
      node_completed: 'ノード完了',
      node_failed: 'ノード失敗',
    };

    function addEventLine(event) {
      const log = document.getElementById('events-log');
      const time = event.timestamp ? new Date(event.timestamp).toLocaleTimeString('ja-JP') : '--:--:--';
      const typeClass = event.type?.includes('completed') ? 'completed'
        : event.type?.includes('failed') ? 'failed'
        : event.type?.includes('started') ? 'started'
        : 'progress';
      const typeLabel = EVENT_LABELS[event.type] || event.type || '不明';

      const line = document.createElement('div');
      line.className = 'event-line';
      line.innerHTML = `<span class="event-time">${time}</span> <span class="event-type ${typeClass}">${esc(typeLabel)}</span> ${esc(event.message || '')}`;

      log.prepend(line);

      while (log.children.length > 100) {
        log.removeChild(log.lastChild);
      }
    }

    function clearEvents() {
      document.getElementById('events-log').innerHTML = '';
    }

    // --- ヘルパー ---
    function esc(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
    function truncate(str, n) { return str && str.length > n ? str.slice(0, n) + '...' : str || ''; }
    function formatTime(iso) {
      if (!iso) return '-';
      try { return new Date(iso).toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
      catch { return iso; }
    }

    // --- 初期化 ---
    loadStatus();
    loadTasks();
    loadEval();
    connectSSE();

    // 30秒ごとに自動更新
    setInterval(() => { loadStatus(); loadTasks(); }, 30000);
    setInterval(loadEval, 60000);
  </script>
</body>
</html>
